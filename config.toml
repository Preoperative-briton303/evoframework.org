# Zola configuration for evoframework.org
# Reference: https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://evoframework.org"

title = "evo framework"
description = "A brand-neutral steward for appliance-class devices. Everything is a plugin."

# Default language; used in feeds.
default_language = "en"

# No Zola theme - templates and CSS are hand-rolled in this repo. The
# `theme` key is intentionally absent; setting it to "" makes Zola try
# to load themes//theme.toml.

# Output directory; default is fine.
output_dir = "public"

# Sass not used; CSS is hand-rolled under static/css/.
compile_sass = false

# Minify generated HTML in build output.
minify_html = true

# Feeds and search index off for now; can be enabled later.
generate_feeds = false
build_search_index = false

# Sitemap and robots.txt are generated by default; keep on.
generate_sitemap = true
generate_robots_txt = true

# No taxonomies yet.
taxonomies = []

# ---- Markdown rendering -----------------------------------------------

[markdown]
# Smart punctuation off - we want straight ASCII quotes and hyphens
# preserved, not auto-replaced into Unicode forms.
smart_punctuation = false

# No emoji-alias rendering.
render_emoji = false

# Definition lists, GitHub-style alerts, lazy images: off for now.
definition_list = false
github_alerts = false
lazy_async_image = false
bottom_footnotes = false

# External link policy. external_links_external defaults to true in
# 0.22; leaving it default. Other rel/target flags off for now.
external_links_target_blank = false
external_links_no_follow = false
external_links_no_referrer = false

# Header anchors off; can be set to "left" or "right" later if wanted.
insert_anchor_links = "none"

# ---- Syntax highlighting ----------------------------------------------
#
# Zola 0.22 uses Giallo (VSCode-flavoured grammars and themes), not
# syntect. Bundled theme names live in the Giallo README:
#   https://github.com/getzola/giallo
#
# Dual-theme setup: Giallo emits a CSS light-dark() function automatically
# so the user's prefers-color-scheme decides which palette is shown. No
# JavaScript required.
#
# Site CSS must include the .giallo-l and .giallo-ln rules from the docs;
# they live in static/css/site.css.

[markdown.highlighting]
error_on_missing_language = false
style = "inline"
light_theme = "github-light"
dark_theme = "github-dark"

# ---- Extra: values templates pull from {{ config.extra.* }} -----------

[extra]
github_repo = "https://github.com/foonerd/evoframework.org"
project_owner = "Just a Nerd"
copyright_year = "2026"
